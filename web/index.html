<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Local LLM Service</title>
<style>
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#0f1115;
    color:#e5e7eb;
    height:100vh;
    display:flex;
    flex-direction:column
  }

  .layout{
    display:flex;
    flex:1;
    overflow:hidden
  }

  .sidebar{
    width:240px;
    background:#111318;
    border-right:1px solid #1f2430;
    display:flex;
    flex-direction:column
  }

  .sidebar-header{
    padding:1rem;
    border-bottom:1px solid #1f2430
  }

  .new-chat{
    width:100%;
    padding:.6rem;
    background:#2563eb;
    border:none;
    border-radius:.5rem;
    color:#fff;
    cursor:pointer
  }

  .chat-list{
    flex:1;
    overflow-y:auto;
    padding:.5rem
  }

  .chat-item{
    padding:.5rem;
    border-radius:.4rem;
    cursor:pointer;
    font-size:.85rem;
    color:#9ca3af
  }

  .chat-item:hover{
    background:#1f2430;
    color:#fff
  }

  header{
    padding:1rem;
    text-align:center;
    background:#151821;
    border-bottom:1px solid #1f2430
  }

  header h1{
    margin:0;
    font-size:1.1rem;
    font-weight:500;
    letter-spacing:0.5px;
    color:#ffffff
  }
  .status{
    margin-top:.4rem;
    font-size:.8rem;
    color:#9ca3af;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.4rem
  }

  .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 6px #22c55e
  }

  #chat{
    flex:1;
    overflow-y:auto;
    padding:1rem;
    display:flex;
    flex-direction:column;
    gap:.6rem
  }

  .bubble{
    max-width:75%;
    padding:.8rem 1rem;
    border-radius:.8rem;
    line-height:1.4;
    font-size:.95rem
  }

  .user{
    align-self:flex-end;
    background:#2563eb;
    color:#fff
  }

  .bot{
    align-self:flex-start;
    background:#1f2430;
    color:#e5e7eb
  }

  #controls{
    display:flex;
    gap:.5rem;
    padding:.8rem;
    background:#151821;
    border-top:1px solid #1f2430
  }

  textarea{
    flex:1;
    background:#1f2430;
    border:1px solid #2a2f3a;
    border-radius:.5rem;
    padding:.6rem;
    font-size:.95rem;
    color:#e5e7eb;
    resize:none
  }

  textarea:focus{
    outline:none;
    border-color:#2563eb
  }

  button{
    cursor:pointer;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:.5rem;
    padding:0 1.2rem;
    font-size:.9rem
  }

  button:disabled{
    background:#374151
  }
</style>
</head>
<body>
<header>
    <h1>Local LLM Service</h1>
    <div class="status">
      <span class="dot"></span>
      Running locally
    </div>
  </header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="new-chat" id="newChatBtn">+ New Chat</button>
    </div>
    <div class="chat-list" id="chatList"></div>
  </div>
  <main id="chat"></main>
</div>

<div id="controls">
  <textarea id="prompt" rows="2" placeholder="Type your message…"></textarea>
  <button id="send" disabled>Send</button>
</div>

<script>

const chat   = document.getElementById("chat");
const promptInput = document.getElementById("prompt");
const send   = document.getElementById("send");

const chatList = document.getElementById("chatList");
const newChatBtn = document.getElementById("newChatBtn");

async function loadConversations() {
  const res = await fetch("/conversations");
  if (!res.ok) return;
  const data = await res.json();

  chatList.innerHTML = "";

  data.conversations.forEach(conv => {
    const item = document.createElement("div");
    item.className = "chat-item";

    item.innerHTML = "";

    const titleSpan = document.createElement("span");
    titleSpan.textContent = conv.title || "New Chat";
    titleSpan.style.flex = "1";

    const renameBtn = document.createElement("span");
    renameBtn.textContent = " ✏️";
    renameBtn.style.cursor = "pointer";
    renameBtn.style.marginLeft = "6px";
    renameBtn.style.opacity = "0.6";

    renameBtn.onclick = async (e) => {
      e.stopPropagation();
      const newTitle = window.prompt("Rename conversation:", conv.title || "New Chat");
      if (!newTitle) return;

      await fetch(`/conversation/${conv.id}/title`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: newTitle })
      });

      await loadConversations();
    };

    item.style.display = "flex";
    item.style.justifyContent = "space-between";
    item.style.alignItems = "center";

    item.appendChild(titleSpan);
    item.appendChild(renameBtn);

    if (conversationId === conv.id) {
      item.style.background = "#1f2430";
      item.style.color = "#fff";
    }

    item.onclick = async () => {
      conversationId = conv.id;
      localStorage.setItem("conversation_id", conversationId);
      await loadHistory();
      await loadConversations();
    };

    chatList.appendChild(item);
  });
}

newChatBtn.onclick = async () => {
  conversationId = null;
  localStorage.removeItem("conversation_id");
  chat.innerHTML = "";
  await loadConversations();
};

let conversationId = localStorage.getItem("conversation_id") || null;

async function loadHistory() {
  if (!conversationId) return;

  const res = await fetch(`/history/${conversationId}`);
  if (!res.ok) return;

  const data = await res.json();
  chat.innerHTML = "";

  data.messages.forEach(msg => {
    addBubble(msg.content, msg.role === "user" ? "user" : "bot");
  });
}

window.addEventListener("load", loadHistory);
window.addEventListener("load", loadConversations);

promptInput.addEventListener("input", () => send.disabled = !promptInput.value.trim());

send.addEventListener("click", async () => {
  if (!promptInput.value.trim()) return;
  addBubble(promptInput.value, "user");
  const payload = {
    prompt: promptInput.value,
    conversation_id: conversationId
  };
  promptInput.value = "";  send.disabled = true;

  const typing = addBubble("…", "bot");
  const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
  }).then(r => r.json());

  if (res.conversation_id) {
    conversationId = res.conversation_id;
    localStorage.setItem("conversation_id", conversationId);
  }
  await loadConversations();

  typing.textContent = res.response;
  chat.scrollTop = chat.scrollHeight;
});

function addBubble(text, cls){
  const div = document.createElement("div");
  div.className = `bubble ${cls}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}
</script>
</body></html>
